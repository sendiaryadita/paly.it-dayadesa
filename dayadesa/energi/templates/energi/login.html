{% extends "energi/base.html" %} {% block title %}Login – DayaDesa{% endblock %}
{% block content %}
<div
  class="min-h-screen flex items-center justify-center px-4 py-12"
  style="
    background: linear-gradient(135deg, var(--sage-light) 0%, var(--cream) 60%);
  "
>
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="card-soft p-8 fade-up">
      <!-- Logo area -->
      <div class="text-center mb-7">
        <div
          class="w-14 h-14 hero-gradient rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-lg"
        >
          <i class="fa-solid fa-leaf text-white text-xl"></i>
        </div>
        <h2 class="text-2xl font-black" style="color: var(--text-main)">
          Selamat Datang Kembali
        </h2>
        <p class="text-sm mt-1" style="color: var(--text-muted)">
          Masuk ke akun DayaDesa Anda
        </p>
      </div>

      <form method="post" class="space-y-4">
        {% csrf_token %}
        <div>
          <label
            class="block text-sm font-semibold mb-1.5"
            style="color: var(--text-main)"
          >
            <i class="fa-solid fa-user mr-1.5" style="color: var(--sage)"></i
            >Username
          </label>
          <input
            type="text"
            name="username"
            class="input-soft"
            placeholder="Masukkan username Anda"
            required
          />
        </div>
        <div>
          <label
            class="block text-sm font-semibold mb-1.5"
            style="color: var(--text-main)"
          >
            <i class="fa-solid fa-lock mr-1.5" style="color: var(--sage)"></i
            >Password
          </label>
          <div class="relative">
            <input
              type="password"
              name="password"
              id="passwordField"
              class="input-soft pr-12"
              placeholder="Masukkan password Anda"
              required
            />
            <button
              type="button"
              onclick="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-sm"
              style="color: var(--text-muted)"
            >
              <i class="fa-solid fa-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-primary w-full py-3 mt-2 text-base">
          <i class="fa-solid fa-right-to-bracket mr-2"></i>Masuk
        </button>
      </form>

      <div
        class="mt-6 pt-6 text-center"
        style="border-top: 1px solid var(--border-soft)"
      >
        <p class="text-sm" style="color: var(--text-muted)">
          Belum punya akun?
          <a
            href="{% url 'daftar_anggota' %}"
            class="font-bold ml-1"
            style="color: var(--teal-soft)"
            >Daftar sekarang →</a
          >
        </p>
      </div>
    </div>

    <p class="text-center text-xs mt-4" style="color: var(--text-muted)">
      Platform Ketahanan Energi Desa Berkelanjutan 🌱
    </p>
  </div>
</div>

<script>
  function togglePassword() {
    const field = document.getElementById("passwordField");
    const icon = document.getElementById("eyeIcon");
    if (field.type === "password") {
      field.type = "text";
      icon.className = "fa-solid fa-eye-slash";
    } else {
      field.type = "password";
      icon.className = "fa-solid fa-eye";
    }
  }
</script>
{% endblock %}
